# คำสั่งรัน: docker compose -f database/docker-compose-mysql-phpmyadmin.yaml up -d
# คำสั่งปิด: docker compose -f database/docker-compose-mysql-phpmyadmin.yaml down

networks:
  mysql-network:
    name: mysql-network

services:
  mysql:
    image: mysql
    container_name: mysql
    restart: always
    ports:
      - 3309:3306       # ตัวกลางของเรากับ port มาตรฐาน
    volumes:
       - ./mysql-data:/var/lib/mysql # เก็บข้อมูลไว้ในเครื่องเป็น text
    environment:
      MYSQL_ROOT_PASSWORD: root
#      MYSQL_USER: user
#      MYSQL_PASSWORD: user
#      MYSQL_DATABASE: data
      MYSQL_DATABASE: easycheck
    networks:
      - mysql-network
      
  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      PMA_HOSTS: mysql
      PMA_PORT: 3306      # port มาตรฐานของ MySQL
#      PMA_USER: root
#      PMA_PASSWORD: root
    networks:
      - mysql-network